schema_version: 1

context:
  name: bm25s
  version: "0.3.2.post1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/bm25s-${{ version }}.tar.gz
  sha256: 66470f49fb9e8208e3d01d400d237ed09ecad9a03d7721f82cf520e3b2e29aee

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - scipy
    - numpy

tests:
  - python:
      imports:
        - bm25s
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: An ultra-fast implementation of BM25 based on sparse matrices.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/xhluca/bm25s
  documentation: https://bm25s.github.io/

extra:
  recipe-maintainers:
    - thewchan
